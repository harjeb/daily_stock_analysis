# Wolf Post-Market Skill / 狼大盘后决策
# Distilled framework for next-session single-stock entry planning.

name: wolf_postmarket
display_name: 狼大盘后决策
description: 盘后复盘单个板块或个股，按大盘、主线、位置、量价和失效条件判断次日是否允许入场。
