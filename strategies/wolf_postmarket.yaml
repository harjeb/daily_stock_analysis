instructions: |
  **狼大盘后决策（Wolf Post-Market Decision Framework, daily-K edition）**

  本 skill 是从楼主发言中蒸馏出的盘后交易框架。它只保留可执行规则，不引用、不复述、不携带 NGA 原始回帖。当前 DSA 集成只使用日 K、均线、BOLL、量价、大盘摘要和已有个股上下文；没有 15 分钟 K 时，所有分时/尾盘/缺口内确认规则必须降级为“等待确认”。

  ## 总目标

  对单个个股或 ETF 输出“次日交易计划”，不是盘后立即执行指令。结论必须回答：
  - 现在能不能主动入场？
  - 如果不能，是因为大盘、主线、位置、量能、形态、数据缺失中的哪一项？
  - 如果只能观察，明天什么条件才允许从 `watch` 升级为 `probe/enter`？
  - 如果已持有，应该持有、减仓、等待确认，还是不能加仓？

  ## 不可突破的硬原则

  1. 大盘先行，主线第二，个股第三。不要孤立判断个股。
  2. 位置交易优先于题材故事。到位置买，到位置卖；错过位置就写 `wait_pullback` 或 `missed_entry`。
  3. 预判和应对分离。可以列路径，但执行必须绑定触发条件。
  4. 不追高。主线地位不能覆盖追高风险。
  5. 仓位是输出的一部分。没有仓位上限的建议是不完整建议。
  6. 技术指标只是资金逻辑的证据，不是信仰。强政策、强干预、重大事件会让形态失真。
  7. 数据缺失时必须降级，不得脑补板块强度、黄白线、分时承接或尾盘确认。

  ## 决策顺序

  ### 1. 大盘环境

  先判断市场是否允许做多：
  - 大盘退潮、高风险、系统性风险、指数破位时，个股机会降级为 `watch/no_entry`。
  - 大盘谨慎或震荡时，即使个股形态好，也只允许 `probe` 或等待更低位置。
  - 大盘正常但黄白线/广度弱时，白线拉升不能视为全市场买点；除非目标就是大票核心。
  - 大盘放量突破压力位，且板块同步，则可提高右侧确认。

  ### 2. 主线和板块

  个股必须放在板块里判断：
  - 优先当前主线、核心细分、核心权重或缩圈后仍强的标的。
  - 低位不等于安全；非主线低位轮动、边缘概念、后知后觉补涨容易坑人。
  - ETF 要看权重核心和板块风向，不只看 ETF 自身价格。
  - 板块强但个股位置差，只能等待回踩；个股强但板块弱，主动入场降级。
  - 谨慎环境下，“低位 + 长时间横盘走平”优于单纯超跌。

  ### 3. 位置

  日 K 版位置判断按以下顺序：
  - MA5 乖离超过 5%：不追，写 `wait_pullback/missed_entry`。
  - 跌破 MA20：中期结构未站稳，不给主动入场。
  - 多头排列 MA5 > MA10 > MA20，且价格贴近 MA5/MA10：可进入 `probe/enter` 候选。
  - 多头排列但离 MA5 偏高：只观察，等回踩。
  - 突破后用突破日收盘价或板块指数作为止损参考，收盘跌破则减仓/退出。
  - 黄金分割和均线只能画候选挂线，不能单独触发买入。

  ### 4. 量价

  量能决定位置是否有效：
  - 压力突破不能缩量，关键位必须看到主动资金。
  - 缩量止跌可说明卖压减轻，但不保证马上盈利。
  - 放量转缩量，且黑 K 跌破 MA5：按短期见顶/减仓信号处理；主升浪不一定结束，但次日不允许追买。
  - 高位放量跌破前一根红 K 低点：上一段上涨失效风险，按减仓/不加仓处理。
  - 量比过高且价格远离支撑：冲动放量或追高风险，降级。
  - 缩量拉升且广度弱：更偏减仓/等待确认，不是新增入场点。

  ### 5. K 线形态口诀（日 K 可用部分）

  这些形态只作为证据，不得单独覆盖大盘、主线、位置和仓位门禁：

  - W 底 + 红三兵 + 颈线突破 + 关键位站稳数日 + 放量：阶段切换和右侧确认增强。
  - 三角收敛尾部向上突破：可视作 3-3 二买类候选，但必须有大盘/板块共振。
  - 第一根红 K：长跌后的第一根红 K 常用于恢复信心或吸引追高，不能机械追。
  - 不吃最后一根红 K：只在特定强趋势或高位放量跌破前红 K 时作为减仓线，不是普遍清仓公式。
  - BOLL 偏离上轨过大：可先降仓或等待回轨；回到轨内后再看承接。
  - 站回 BOLL 中轨 + 颈线/二买位：右侧条件增强。
  - 未能站回 BOLL 中轨：市场或板块仍弱，主动入场降级。
  - 底分型/底背离：只有在量能低于前低、位置合适、板块不继续杀跌时，才说明技术反弹需求。
  - 双跌停策略：必须借板块反弹之势；板块不反弹，条件不成立。成功后到计划利润要快止盈。

  ### 6. 揉搓线口诀

  使用前必须先确认趋势、量能和上下影线长度。日 K 量化口径：
  - `range = high - low`。若 `range <= 0`，不能判断影线。
  - `body = abs(close - open)`。
  - `upper_shadow = high - max(open, close)`，代表日内高点到实体上沿的抛压距离。
  - `lower_shadow = min(open, close) - low`，代表实体下沿到日内低点的承接距离。
  - `upper_shadow_ratio = upper_shadow / range`。
  - `lower_shadow_ratio = lower_shadow / range`。
  - 红 K：`close >= open`；黑 K：`close < open`。
  - 长上影：`upper_shadow_ratio >= 0.35` 且 `upper_shadow >= body * 1.2`。
  - 长下影：`lower_shadow_ratio >= 0.35` 且 `lower_shadow >= body * 1.2`。
  - “下影接上影”：前一根日 K 是长下影，当前日 K 是长上影。
  - “上影接下影”：前一根日 K 是长上影，当前日 K 是长下影。
  - 趋势优先用 `MA5/MA10/MA20` 和斜率判断：`MA5 > MA10 > MA20` 且 MA5 上行偏上涨趋势；`MA5 < MA10 < MA20` 且 MA5 下行偏下跌趋势。

  量化后再套口诀：
  - 下跌趋势 + 当前黑 K + 下影接上影：先有低位承接、再被日内高点抛压打回，中继下跌概率高。
  - 下跌趋势 + 当前红 K + 下影接上影：支撑位有承接但上方仍有抛压，倾向震荡选方向。
  - 下跌趋势 + 当前红 K + 上影接下影：先试探上方压力、再有低位承接，偏支撑位资金抢反弹。
  - 下跌趋势 + 当前黑 K + 上影接下影：上攻失败但低位有承接，可能短期止跌。
  - 上涨趋势 + 当前黑 K + 下影接上影：趋势内先承接后遇抛压，开始有分歧。
  - 上涨趋势 + 当前红 K + 下影接上影：有分歧但收红，仍偏强势，可继续观察新高。
  - 上涨趋势 + 当前红 K + 上影接下影：日内高点有抛压但低点承接强，只说明承接强，不允许追高。
  - 上涨趋势 + 当前黑 K + 上影接下影：上攻失败且收黑，承接偏弱，可能短期顶。

  ### 7. 缺口和分时规则的降级

  完整体系里有缺口和 3 个 15 分钟确认，但当前 DSA 日 K 版没有 15 分钟 K：
  - 不判断“3 个 15 分钟不破缺口”。
  - 不判断“尾盘确认”。
  - 不判断“分时底分型”。
  - 不判断“下午承接强弱”。
  - 遇到这些场景，只能输出 `wait_confirm`，并写清需要次日盘中确认。

  如果未来提供 15 分钟 K，可再启用：
  - 高开回调不破缺口才是买点。
  - 低开反弹不过缺口是卖点。
  - 启动缺口不能补；补了要降级。
  - 连续衰竭缺口说明行情后段风险提高。

  ### 8. 仓位规则

  - 数据不完整：`position_cap=0%` 或 `probe_only`。
  - 大盘谨慎：最多试探仓，不主动重仓。
  - 大盘允许 + 主线共振 + 位置贴近 MA5/MA10 + 量能温和：可 `probe/enter`，但仍要给仓位上限。
  - 远离买点、放量过热、BOLL 偏离过大：`0%`，等待回踩。
  - 已持有标的出现黑 K 跌破 MA5、放量跌破前红 K、跌破 MA20：优先输出减仓/不加仓逻辑。
  - 现金不是必须马上补回去。卖出后重新检查大盘、板块、个股位置和原计划仓位。

  ## 输出格式

  尽量输出或补充 `wolf_postmarket` 小节：

  ```json
  {
    "wolf_action": "no_entry|watch|probe|enter|reduce|exit",
    "entry_type": "core_mainline|low_flat_base|pullback_support|breakout_confirm|wait_pullback|wait_confirmation|blocked",
    "market_sector_stock_alignment": "aligned|mixed|conflict|unknown",
    "position_cap": "0%|probe|10%|20%|custom",
    "entry_conditions": [],
    "invalid_conditions": [],
    "next_day_paths": [],
    "stop_reference_type": "stock_close|sector_index|ma5|ma20|ma60|prior_red_candle|none",
    "data_limitations": [],
    "evidence_rule_ids": []
  }
  ```

  文案要求：
  - 结论必须是次日计划，不得写成盘后可立即成交。
  - 对白名单：偏“观察 / 可试探 / 可入场候选”。
  - 对 `STOCK_LIST`：偏“持有观察 / 不加仓 / 减仓 / 等确认 / 低吸触发条件”。
  - 若存在确定性护栏 `hard_vetoes`，不得用题材叙事或新闻情绪覆盖。
  - 不要给“肯定涨、必然新高、无脑买”这类确定性表达。

  ## 评分调整建议

  - 大盘允许 + 主线共振 + 核心标的 + 多头排列 + MA5/MA10 附近缩量企稳：提高评分。
  - 主线共振但 MA5 乖离 2%-5%：不追，维持观察，等待回踩。
  - MA5 乖离超过 5%、跌破 MA20、大盘退潮、黑 K 放量跌破 MA5、放量跌破前红 K：降低评分，不给主动买入。
  - 数据缺失：降低置信度，明确写入 `data_limitations`。
